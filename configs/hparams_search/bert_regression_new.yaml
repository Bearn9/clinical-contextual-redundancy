# @package _global_

defaults:
  - override /hydra/sweeper: optuna

optimized_metric: "val/loss_best"

hydra:
  mode: "MULTIRUN"
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    study_name: bert_regression_new
    direction: minimize
    n_trials: 15
    n_jobs: 1
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 1234
    params:
      model_task.optimizer.lr: tag(log, interval(1e-6, 5e-5))
      model_task.optimizer.weight_decay: tag(log, interval(1e-4, 5e-2))
      data.batch_size: choice(4,8,16,32)